# memoryschema-managed — this compose is auto-recovered by `memoryschema preflight` when the Neo4j
# container is missing. The `memoryschema-managed` sentinel in this header is REQUIRED for that auto
# `compose up`: preflight won't run a compose file lacking it (an anti-footgun so it doesn't casually run an
# UNRELATED compose file — not a security boundary; the sentinel is copyable). Don't add untrusted services.
services:
  neo4j:
    image: neo4j:5.26-community
    container_name: memory-schema-neo4j
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      # Secret is interpolated from the sibling .env at `compose up` time — never stored in this file at rest.
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - memory-schema_neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  memory-schema_neo4j_data:
